workflows:
  android-debug-apk:
    name: Android Debug APK
    max_build_duration: 60
    instance_type: mac_mini_m1
    triggering:
      events:
        - push
    environment:
      java: 17
    scripts:
      - name: Clean and Build
        script: |
          flutter clean
          flutter pub get
          cd android
          gradle wrapper --gradle-version 8.3
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon --android-skip-build-dependency-validation
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
