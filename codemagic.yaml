workflows:
  android-debug-apk:
    name: Android Debug APK
    max_build_duration: 60
    instance_type: mac_mini_m1
    triggering:
      events:
        - push
    environment:
      java: 17
    scripts:
      - name: Create local.properties and Build
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          flutter clean
          flutter pub get
          cd android
          # Garante a criação do wrapper e corrige permissões
          gradle wrapper --gradle-version 8.3
          chmod +x gradlew
          # Limpa e builda
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon --info
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
