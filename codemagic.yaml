workflows:
  android-debug-apk:
    name: Android Debug APK
    max_build_duration: 60
    instance_type: mac_mini_m1
    triggering:
      events:
        - push
    environment:
      java: 17
    scripts:
      - name: Build Android APK
        script: |
          # Cria o arquivo que o build.gradle usa para encontrar o SDK do Flutter
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          
          # Limpeza e preparação
          flutter clean
          flutter pub get
          
          # Executa o build usando o comando otimizado do Flutter
          flutter build apk --debug --info
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
