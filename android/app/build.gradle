plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.sofit.sofit_modas_pdv"
    compileSdk 34

    defaultConfig {
        applicationId "com.sofit.sofit_modas_pdv"
        minSdk 23
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }
}

dependencies {
    // Isso resolve o erro de 'androidx.annotation.Keep' e outros símbolos ausentes
    implementation "androidx.annotation:annotation:1.6.0"
    implementation "androidx.appcompat:appcompat:1.6.1"
}
