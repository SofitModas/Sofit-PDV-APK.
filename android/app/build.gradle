plugins {
    id "com.android.application"
    id "kotlin-android"
    // Esta linha é a chave: ela conecta o projeto Android com as classes do Flutter
    id "dev.flutter.flutter-gradle-plugin" 
}

android {
    namespace "com.sofit.sofit_modas_pdv"
    compileSdk 34

    // Adicione esta configuração para garantir que o compilador Java 
    // entenda as classes do Flutter (Java 17)
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId "com.sofit.sofit_modas_pdv"
        minSdk 23
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }
}

dependencies {
    // Isso traz as classes do AndroidX que o seu Firebase e o Flutter precisam
    implementation "androidx.annotation:annotation:1.6.0"
}
